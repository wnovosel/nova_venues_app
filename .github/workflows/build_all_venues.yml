name: Build & Submit All Venue Apps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build (nova_cellars | brew32 | all)'
        required: true
        default: 'all'

jobs:
  # ── iOS builds ──────────────────────────────────────────────────────────────
  ios:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - flavor: nova_cellars
            entry: main_nova_cellars.dart
            bundle_id: com.novadestinations.wonder
          - flavor: brew32
            entry: main_brew32.dart
            bundle_id: com.novavenues.brew32
          # Add new venues here — nothing else changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up signing
        env:
          CERTIFICATE_BASE64:     ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE:   ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD:       ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 -d > \
            ~/Library/MobileDevice/Provisioning\ Profiles/${{ matrix.flavor }}.mobileprovision

      - name: Build IPA (${{ matrix.flavor }})
        run: |
          flutter build ipa \
            --flavor ${{ matrix.flavor }} \
            -t lib/${{ matrix.entry }} \
            --release

      - name: Upload to TestFlight (${{ matrix.flavor }})
        env:
          APP_STORE_CONNECT_API_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT:  ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          bundle exec fastlane ios submit_${{ matrix.flavor }}

  # ── Android builds ──────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavor: nova_cellars
            package: com.novadestinations.wonder
          - flavor: brew32
            package: com.novavenues.brew32

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Build AAB (${{ matrix.flavor }})
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          flutter build appbundle \
            --flavor ${{ matrix.flavor }} \
            -t lib/main_${{ matrix.flavor }}.dart \
            --release

      - name: Upload to Play Store (${{ matrix.flavor }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: ${{ matrix.package }}
          releaseFiles: android/app/build/outputs/bundle/${{ matrix.flavor }}Release/*.aab
          track: internal

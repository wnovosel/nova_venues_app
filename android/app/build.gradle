// android/app/build.gradle
// Defines all venue flavors. Adding a venue = one new flavorDimension entry.

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '1' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '1.0' }

apply plugin: 'com.android.application'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.novavenues.app"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // ── Flavor dimensions ────────────────────────────────────────────────────
    // One dimension: "venue". Each flavor = one venue app.
    flavorDimensions "venue"

    productFlavors {
        nova_cellars {
            dimension "venue"
            applicationId "com.novadestinations.wonder"
            versionName "1.0.0"
            resValue "string", "app_name", "Nova Destinations"
        }
        brew32 {
            dimension "venue"
            applicationId "com.novavenues.brew32"
            versionName "1.0.0"
            resValue "string", "app_name", "Brew 32"
        }
        // ── TEMPLATE: copy this block to add a new venue ─────────────────
        // knockin_noggin {
        //     dimension "venue"
        //     applicationId "com.novavenues.knockinnoggin"
        //     versionName "1.0.0"
        //     resValue "string", "app_name", "Knockin Noggin"
        // }
    }

    signingConfigs {
        release {
            // Set these in local.properties or CI environment variables
            // keyAlias     = System.getenv("KEY_ALIAS")     ?: ""
            // keyPassword  = System.getenv("KEY_PASSWORD")  ?: ""
            // storeFile    = file(System.getenv("STORE_FILE") ?: "keystore.jks")
            // storePassword = System.getenv("STORE_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
